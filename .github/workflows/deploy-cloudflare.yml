name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "styles.css"
      - "script.js"
      - "team-logos/**"
      - "ai-logos/**"
      - "worker/**"
      - "scripts/prepare-worker-assets.mjs"
      - "wrangler.jsonc"
      - "package.json"
      - ".github/workflows/deploy-cloudflare.yml"

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.CLOUDFLARE_AUTO_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Prepare static assets
        run: npm run prepare:worker-assets

      - name: Check Worker syntax
        run: npm run check:worker

      - name: Deploy
        run: npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
