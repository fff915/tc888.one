name = "tc888"
main = "src/index.ts"
compatibility_date = "2024-11-08"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "tc888-db"
database_id = "PLACEHOLDER_D1_ID"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "tc888-storage"

[durable_objects]
bindings = [
  { name = "SCORE_POLLER", class_name = "ScorePoller" },
  { name = "LOGO_PRECACHER", class_name = "LogoPrecacher" }
]

[[migrations]]
tag = "v1"
new_classes = ["ScorePoller", "LogoPrecacher"]

[triggers]
crons = []

[env.production.vars]
LOCAL_TIMEZONE = "Asia/Shanghai"
API_FOOTBALL_BASE_URL = "https://v3.football.api-sports.io"

[env.production.secrets]
API_FOOTBALL_API_KEY = ""
ADMIN_TOKEN = ""
DEEPSEEK_API_KEY = ""
DOUBAO_API_KEY = ""
DOUBAO_ENDPOINT_ID = ""